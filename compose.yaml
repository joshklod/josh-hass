services:
  homeassistant:
    container_name:   homeassistant
    image:            ghcr.io/home-assistant/home-assistant:stable
    restart:          unless-stopped
    # privileged:       true
    network_mode:     host
    volumes:
      - type:        bind
        source:      /srv/homeassistant/config
        target:      /config
        bind:
          create_host_path: true
      - type:        bind
        source:      /etc/localtime
        target:      /etc/localtime
        read_only:   true
      - type:        bind
        source:      /run/dbus
        target:      /run/dbus
        read_only:   true
    devices:
      - source:        /dev/serial/by-id/usb-Nabu_Casa_SkyConnect_v1.0_0c27d35557b7ed1191f49c5938a92db5-if00-port0
        target:        /dev/ttyUSB-SkyConnect
        permissions:   rwm
